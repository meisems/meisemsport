<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Portfolio — Developer & Designer</title>

    <!-- Styles -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/projects.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <div class="container">

        <!-- Header -->
        <header>
            <div class="header-content">
                <div class="logo">Portfolio</div>
                <div class="nav-container">
                    <nav>
                        <a href="#projects">Projects</a>
                        <a href="#footer">Contact</a>
                    </nav>
                    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                        <span id="themeIcon">🌙</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Hero Section -->
<section class="hero">
    <h1>Crafting Digital Experiences</h1>
    <p class="subtitle">Full-Stack Developer Building Modern Web Solutions</p>
    <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
        <a href="#projects" class="cta-button">View My Work</a>
        <button onclick="openContactModal()" 
                style="padding: 14px 36px; background: linear-gradient(135deg, #10b981, #34d399); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; box-shadow: var(--shadow-md);">
            💼 Hire Me
        </button>
    </div>
</section>

        <!-- Projects Section -->
        <section class="projects-section" id="projects">
            <h2 class="section-title">Featured Projects</h2>
            <div class="projects-grid" id="projectsGrid">
                <!-- Projects dynamically loaded by projects.js -->
            </div>
            <div class="add-project-btn" id="addProjectBtn">
                <button onclick="openAddModal()">+ Add New Project</button>
            </div>
        </section>

    </div>

    <!-- Footer -->
    <footer id="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2024 All rights reserved. Built with passion and code.</p>
                <div class="social-links">
                    <a href="https://github.com" target="_blank" rel="noopener noreferrer">GitHub</a>
                    <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer">LinkedIn</a>
                    <a href="mailto:hello@example.com">Email</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Edit / Add Project Modal -->
    <div class="modal" id="projectModal">
        <div class="modal-content">
            <h2 class="modal-header" id="modalTitle">Edit Project</h2>
            <form id="projectForm">

                <div class="form-group">
                    <label>Project Icon (Emoji)</label>
                    <input type="text" id="formIcon" maxlength="2" placeholder="🎪" required>
                </div>

                <div class="form-group">
                    <label>Project Title</label>
                    <input type="text" id="formTitle" placeholder="MetroEvents" required>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="formCategory" placeholder="Web Application" required>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="formDescription" placeholder="A dynamic event management platform..." required></textarea>
                </div>

                <div class="form-group">
                    <label>Project Preview Image</label>
                    <input type="file" id="imageUpload" accept="image/*" style="margin-bottom: 10px; width: 100%;">
                    <input type="text" id="formImageUrl" placeholder="Or paste image URL here (optional)" style="margin-top: 8px;">
                    <small style="color: #666; display: block; margin-top: 5px;">Upload from computer preferred</small>
                </div>

                <div class="form-group">
                    <label>Project Link <span style="color: #ef4444; font-size: 13px;">(Required - Full URL)</span></label>
                    <input type="text" id="formLink" placeholder="https://meisemsport.onrender.com" required>
                </div>

                <div class="form-group">
                    <label>Technologies</label>
                    <div class="tech-input-container">
                        <input type="text" id="techInput" placeholder="e.g., React">
                        <button type="button" onclick="addTechTag()">Add</button>
                    </div>
                    <div class="tech-tags-edit" id="techTagsContainer"></div>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn-save">Save Project</button>
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                </div>

            </form>
        </div>
    </div>

    <!-- Scripts (order matters) -->
    <script src="js/data.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/projects.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
