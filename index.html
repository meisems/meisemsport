<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Portfolio — Developer & Designer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap');

        :root {
            /* Light mode (default) */
            --bg-primary: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --border-color: rgba(0, 0, 0, 0.08);
            --accent-primary: #2563eb;
            --accent-secondary: #db2777;
            --accent-tertiary: #059669;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 10px 25px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.12);
        }

        html[data-theme="dark"] {
            /* Dark mode */
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-primary: #60a5fa;
            --accent-secondary: #f472b6;
            --accent-tertiary: #34d399;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 10px 25px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            padding: 40px 0;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-primary);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeInDown 0.6s ease-out;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-container {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-primary);
            transition: width 0.3s ease;
        }

        nav a:hover {
            color: var(--accent-primary);
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Theme Toggle */
        .theme-toggle {
            background: none;
            border: 2px solid var(--border-color);
            color: var(--text-primary);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            border-color: var(--accent-primary);
            background-color: var(--bg-secondary);
        }

        .theme-toggle:active {
            transform: scale(0.95);
        }

        /* Admin Toggle - Hidden */
        .admin-toggle {
            display: none;
        }

        /* Hero Section */
        .hero {
            padding: 100px 0 80px;
            text-align: center;
            animation: fadeIn 0.8s ease-out 0.2s backwards;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(42px, 7vw, 64px);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-weight: 300;
            letter-spacing: 0.5px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-button {
            display: inline-block;
            padding: 14px 36px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: var(--shadow-md);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        /* Projects Section */
        .projects-section {
            padding: 80px 0;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 60px;
            text-align: center;
            color: var(--text-primary);
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 2px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 32px;
            animation: fadeIn 0.8s ease-out 0.4s backwards;
        }

        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .project-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent-primary);
        }

        .project-image-container {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--bg-secondary), var(--border-color));
            overflow: hidden;
            position: relative;
        }

        .project-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .project-card:hover .project-image {
            transform: scale(1.05);
        }

        .project-image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(219, 39, 119, 0.1));
        }

        .project-header {
            padding: 32px;
            flex: 1;
        }

        .project-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .project-category {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .project-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .project-description {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .project-footer {
            padding: 0 32px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .tech-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tech-tag {
            font-size: 12px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: 500;
        }

        .project-link {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .project-link:hover {
            gap: 8px;
            transform: translateX(4px);
        }

        /* Admin Controls */
        .admin-controls {
            display: none;
            position: absolute;
            top: 12px;
            right: 12px;
            gap: 8px;
            z-index: 10;
        }

        .admin-controls.visible {
            display: flex;
        }

        .admin-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .admin-btn:hover {
            transform: scale(1.1);
        }

        .admin-btn.edit:hover {
            border-color: #fbbf24;
            color: #fbbf24;
        }

        .admin-btn.delete:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .tech-input-container {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .tech-input-container input {
            flex: 1;
        }

        .tech-input-container button {
            padding: 12px 16px;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tech-input-container button:hover {
            background: var(--accent-secondary);
        }

        .tech-tags-edit {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .tech-tag-edit {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-primary);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
        }

        .tech-tag-edit button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            line-height: 1;
        }

        .form-buttons {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .form-buttons button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .form-buttons .btn-save {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }

        .form-buttons .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .form-buttons .btn-cancel {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .form-buttons .btn-cancel:hover {
            background: var(--border-color);
        }

        .add-project-btn {
            display: none;
            margin-top: 40px;
            text-align: center;
        }

        .add-project-btn button {
            padding: 16px 40px;
            background: var(--accent-tertiary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .add-project-btn button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .add-project-btn.visible {
            display: block;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideOutRight {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(100px);
            }
        }

        /* Footer */
        footer {
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 60px 0;
            margin-top: 80px;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 32px;
        }

        .footer-content p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .social-links {
            display: flex;
            gap: 24px;
        }

        .social-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .social-links a:hover {
            color: var(--accent-primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 20px;
            }

            .nav-container {
                gap: 20px;
            }

            nav a {
                font-size: 13px;
            }

            h1 {
                font-size: 36px;
            }

            .subtitle {
                font-size: 16px;
            }

            .projects-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }

            .section-title {
                font-size: 32px;
            }

            .project-header,
            .project-footer {
                padding: 28px;
            }

            .project-title {
                font-size: 22px;
            }

            .modal-content {
                padding: 28px;
            }

            .footer-content {
                flex-direction: column;
                text-align: center;
            }
        }

        @media (prefers-color-scheme: dark) {
            html:not([data-theme="light"]) {
                color-scheme: dark;
            }
        }

        @media (prefers-color-scheme: light) {
            html:not([data-theme="dark"]) {
                color-scheme: light;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-content">
                <div class="logo">Portfolio</div>
                <div class="nav-container">
                    <nav>
                        <a href="#projects">Projects</a>
                        <a href="#footer">Contact</a>
                    </nav>
                    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                        <span id="themeIcon">🌙</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Hero Section -->
        <section class="hero">
            <h1>Crafting Digital Experiences</h1>
            <p class="subtitle">Full-Stack Developer Building Modern Web Solutions</p>
            <a href="#projects" class="cta-button">View My Work</a>
        </section>

        <!-- Projects Section -->
        <section class="projects-section" id="projects">
            <h2 class="section-title">Featured Projects</h2>
            
            <div class="projects-grid" id="projectsGrid">
                <!-- Projects will be dynamically loaded here -->
            </div>

            <div class="add-project-btn" id="addProjectBtn">
                <button onclick="openAddModal()">+ Add New Project</button>
            </div>
        </section>
    </div>

    <!-- Footer -->
    <footer id="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2024 All rights reserved. Built with passion and code.</p>
                <div class="social-links">
                    <a href="https://github.com" target="_blank" rel="noopener noreferrer">GitHub</a>
                    <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer">LinkedIn</a>
                    <a href="mailto:hello@example.com">Email</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Edit/Add Project Modal -->
    <div class="modal" id="projectModal">
        <div class="modal-content">
            <h2 class="modal-header" id="modalTitle">Edit Project</h2>
            
            <form id="projectForm">
    <div class="form-group">
        <label>Project Icon (Emoji)</label>
        <input type="text" id="formIcon" maxlength="2" placeholder="🎪" required>
    </div>
    <div class="form-group">
        <label>Project Title</label>
        <input type="text" id="formTitle" placeholder="MetroEvents" required>
    </div>
    <div class="form-group">
        <label>Category</label>
        <input type="text" id="formCategory" placeholder="Web Application" required>
    </div>
    <div class="form-group">
        <label>Description</label>
        <textarea id="formDescription" placeholder="A dynamic event management platform..." required></textarea>
    </div>
    
    <!-- Improved Image URL Field -->
    <div class="form-group">
        <label>Preview Image URL <span style="color:#666; font-size:13px;">(Direct image link)</span></label>
        <input type="url" id="formImageUrl" placeholder="https://example.com/image.jpg">
    </div>
    
    <!-- Improved Project Link Field -->
    <div class="form-group">
        <label>Project Link <span style="color:#ef4444; font-size:13px;">(Full URL required)</span></label>
        <input type="text" id="formLink" placeholder="https://yourproject.onrender.com" required>
    </div>

    <div class="form-group">
        <label>Technologies</label>
        <div class="tech-input-container">
            <input type="text" id="techInput" placeholder="e.g., React">
            <button type="button" onclick="addTechTag()">Add</button>
        </div>
        <div class="tech-tags-edit" id="techTagsContainer"></div>
    </div>

    <div class="form-buttons">
        <button type="submit" class="btn-save">Save Project</button>
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
</form>
        </div>
    </div>

    <script>
        // Default projects data
        const defaultProjects = [
            {
                id: 1,
                icon: '🎪',
                category: 'Web Application',
                title: 'MetroEvents',
                description: 'A dynamic event management platform for discovering, creating, and attending events in your city. Features real-time event updates, location-based search, and community engagement tools.',
                imageUrl: 'https://images.unsplash.com/photo-1540575467063-178f50002cbc?w=500&h=300&fit=crop',
                link: 'https://metroevents.onrender.com',
                technologies: ['React', 'Node.js', 'MongoDB', 'Maps API']
            },
            {
                id: 2,
                icon: '🔬',
                category: 'Medical Platform',
                title: 'Agapay Clinical Lab',
                description: 'A comprehensive laboratory management system designed for healthcare facilities. Streamlines patient records, test results, and appointment scheduling with secure data handling and compliance.',
                imageUrl: 'https://images.unsplash.com/photo-1576091160550-2173dba999ef?w=500&h=300&fit=crop',
                link: 'https://agapay-clinical-lab.onrender.com',
                technologies: ['React', 'Express.js', 'PostgreSQL', 'Security']
            },
            {
                id: 3,
                icon: '🍣',
                category: 'E-Commerce',
                title: 'Tisoy Sushi Maki',
                description: 'An elegant online ordering platform for a premium sushi restaurant. Features interactive menu browsing, real-time order tracking, and seamless payment integration for a delightful customer experience.',
                imageUrl: 'https://images.unsplash.com/photo-1579584425555-c3ce17fd4351?w=500&h=300&fit=crop',
                link: 'https://tisoy-sushi-maki.onrender.com',
                technologies: ['React', 'Stripe API', 'Firebase', 'Responsive']
            }
        ];

        let projects = [];
        let isAdminMode = false;
        let editingProjectId = null;
        let nextProjectId = 4;
        const ADMIN_SECRET = 'eliej627456';

        // Initialize
        function init() {
            loadProjects();
            renderProjects();
            initializeTheme();
            setupEventListeners();
            checkAdminMode();
        }
        
        function checkAdminMode() {
            const params = new URLSearchParams(window.location.search);
            const adminParam = params.get('admin');
            
            if (adminParam === ADMIN_SECRET || sessionStorage.getItem('adminMode') === 'true') {
                isAdminMode = true;
                sessionStorage.setItem('adminMode', 'true');
        
        // Clean URL
             if (adminParam) {
                window.history.replaceState({}, document.title, window.location.pathname);
             }
                renderProjects();
            showAdminNotification();
            }
        }

        function showAdminNotification() {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
                color: white;
                padding: 16px 24px;
                border-radius: 8px;
                font-weight: 600;
                z-index: 2000;
                animation: slideInRight 0.3s ease-out;
                box-shadow: var(--shadow-md);
            `;
            notification.textContent = '✓ Admin Mode Activated';
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOutRight 0.3s ease-out forwards';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        function exitAdminMode() {
            isAdminMode = false;
            sessionStorage.removeItem('adminMode');
            renderProjects();
            const addBtn = document.getElementById('addProjectBtn');
            addBtn.classList.remove('visible');
        }

        function loadProjects() {
            const saved = localStorage.getItem('portfolioProjects');
            projects = saved ? JSON.parse(saved) : [...defaultProjects];
            
            // Update nextProjectId
            if (projects.length > 0) {
                nextProjectId = Math.max(...projects.map(p => p.id)) + 1;
            }
        }

        function saveProjects() {
            localStorage.setItem('portfolioProjects', JSON.stringify(projects));
        }

        function renderProjects() {
    const grid = document.getElementById('projectsGrid');
    grid.innerHTML = '';
    
    projects.forEach(project => {
        const card = document.createElement('div');
        card.className = 'project-card';
       
        card.innerHTML = `
            <div class="project-image-container">
                ${project.imageUrl ?
                    `<img src="${project.imageUrl}" alt="${project.title}" class="project-image" onerror="this.style.display='none'">` :
                    `<div class="project-image-placeholder">${project.icon}</div>`
                }
            </div>
            <div class="admin-controls ${isAdminMode ? 'visible' : ''}">
                <button class="admin-btn edit" onclick="openEditModal(${project.id})">✏️</button>
                <button class="admin-btn delete" onclick="deleteProject(${project.id})">🗑️</button>
            </div>
            <div class="project-header">
                <div class="project-icon">${project.icon}</div>
                <div class="project-category">${project.category}</div>
                <h3 class="project-title">${project.title}</h3>
                <p class="project-description">${project.description}</p>
            </div>
            <div class="project-footer">
                <div class="tech-tags">
                    ${project.technologies.map(tech => `<span class="tech-tag">${tech}</span>`).join('')}
                </div>
                <a href="${project.link}" target="_blank" rel="noopener noreferrer" class="project-link">Visit Project →</a>
            </div>
        `;
       
        grid.appendChild(card);
    });

    // Animation for cards
    const cards = document.querySelectorAll('.project-card');
    cards.forEach((card, index) => {
        card.style.animation = `fadeIn 0.8s ease-out ${0.4 + index * 0.1}s backwards`;
    });

    // === SHOW ADD BUTTON WHEN IN ADMIN MODE ===
    const addBtn = document.getElementById('addProjectBtn');
    if (addBtn) {
        addBtn.classList.toggle('visible', isAdminMode);
    }
}

            const addBtn = document.getElementById('addProjectBtn');
            addBtn.classList.toggle('visible', isAdminMode);

        let currentTechTags = [];

        function openAddModal() {
            editingProjectId = null;
            currentTechTags = [];
            document.getElementById('modalTitle').textContent = 'Add New Project';
            document.getElementById('projectForm').reset();
            document.getElementById('techTagsContainer').innerHTML = '';
            document.getElementById('projectModal').classList.add('active');
        }

        function openEditModal(projectId) {
            const project = projects.find(p => p.id === projectId);
            if (!project) return;

            editingProjectId = projectId;
            currentTechTags = [...project.technologies];
            
            document.getElementById('modalTitle').textContent = 'Edit Project';
            document.getElementById('formIcon').value = project.icon;
            document.getElementById('formTitle').value = project.title;
            document.getElementById('formCategory').value = project.category;
            document.getElementById('formDescription').value = project.description;
            document.getElementById('formImageUrl').value = project.imageUrl || '';
            document.getElementById('formLink').value = project.link;
            
            renderTechTags();
            document.getElementById('projectModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('projectModal').classList.remove('active');
            document.getElementById('projectForm').reset();
            currentTechTags = [];
            document.getElementById('techTagsContainer').innerHTML = '';
            editingProjectId = null;
        }

        function addTechTag() {
            const input = document.getElementById('techInput');
            const tech = input.value.trim();

            if (tech && !currentTechTags.includes(tech)) {
                currentTechTags.push(tech);
                input.value = '';
                renderTechTags();
            }
        }

        function renderTechTags() {
            const container = document.getElementById('techTagsContainer');
            container.innerHTML = currentTechTags.map(tech => `
                <div class="tech-tag-edit">
                    ${tech}
                    <button type="button" onclick="removeTechTag('${tech}')">×</button>
                </div>
            `).join('');
        }

        function removeTechTag(tech) {
            currentTechTags = currentTechTags.filter(t => t !== tech);
            renderTechTags();
        }

        function deleteProject(projectId) {
            if (confirm('Are you sure you want to delete this project?')) {
                projects = projects.filter(p => p.id !== projectId);
                saveProjects();
                renderProjects();
            }
        }

        document.getElementById('projectForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const projectData = {
                icon: document.getElementById('formIcon').value,
                title: document.getElementById('formTitle').value,
                category: document.getElementById('formCategory').value,
                description: document.getElementById('formDescription').value,
                imageUrl: document.getElementById('formImageUrl').value,
                link: document.getElementById('formLink').value,
                technologies: currentTechTags
            };

            if (editingProjectId) {
                // Update existing
                const project = projects.find(p => p.id === editingProjectId);
                if (project) {
                    Object.assign(project, projectData);
                }
            } else {
                // Add new
                projects.push({
                    id: nextProjectId++,
                    ...projectData
                });
            }

            saveProjects();
            renderProjects();
            closeModal();
        });

        // Theme functionality
        function initializeTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (prefersDark ? 'dark' : 'light');
            setTheme(theme);
        }

        function setTheme(theme) {
            const html = document.documentElement;
            const themeIcon = document.getElementById('themeIcon');
            
            if (theme === 'dark') {
                html.setAttribute('data-theme', 'dark');
                themeIcon.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            } else {
                html.removeAttribute('data-theme');
                themeIcon.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            setTheme(isDark ? 'light' : 'dark');
        }

        function setupEventListeners() {
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);

            // Keyboard shortcut to show admin menu (Ctrl+Shift+A)
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.shiftKey && e.key === 'A') {
                    e.preventDefault();
                    showAdminMenu();
                }
            });

            // Close modal on escape key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && document.getElementById('projectModal').classList.contains('active')) {
                    closeModal();
                }
            });

            // Close modal on background click
            document.getElementById('projectModal').addEventListener('click', (e) => {
                if (e.target.id === 'projectModal') {
                    closeModal();
                }
            });

            // Add tech tag on Enter key
            document.getElementById('techInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addTechTag();
                }
            });

            // Smooth scroll
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
            });
        }

        function showAdminMenu() {
            if (isAdminMode) {
                // If already in admin mode, show exit option
                if (confirm('Click OK to exit Admin Mode')) {
                    exitAdminMode();
                }
            } else {
                // Show prompt for admin code
                const code = prompt('Enter admin code:');
                if (code === ADMIN_SECRET) {
                    isAdminMode = true;
                    sessionStorage.setItem('adminMode', 'true');
                    renderProjects();
                    showAdminNotification();
                } else if (code !== null) {
                    alert('Invalid admin code');
                }
            }
        }

        // Initialize on page load
        init();
    </script>
</body>
